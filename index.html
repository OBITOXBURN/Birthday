<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Wish Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { overflow: hidden; background: linear-gradient(135deg, #ffdde1, #ee9ca7); }
    .page {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: left 0.8s ease-in-out;
    }
    .active { left: 0; }
    .prev { left: -100%; }
    h1 { font-size: 2.5rem; margin-bottom: 20px; color: white; }
    p { font-size: 1.2rem; color: white; max-width: 700px; }
    button {
      margin-top: 30px;
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #e91e63;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    button:hover { transform: scale(1.1); }
    .typewriter {
      border-right: 2px solid white;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 6s steps(60, end) forwards, blink 0.8s infinite;
    }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-color: transparent; } }
    .scroll-box {
      height: 100px;
      width: 320px;
      overflow: hidden;
      margin-top: 20px;
      position: relative;
    }
    .scroll-text {
      position: absolute;
      width: 100%;
      animation: scrollText 8s linear infinite;
      color: white;
    }
    @keyframes scrollText {
      0% { top: 100%; }
      100% { top: -100%; }
    }
    .heart {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
    .slideshow img {
      width: 220px;
      height: 220px;
      border-radius: 20px;
      object-fit: cover;
      margin-top: 20px;
    }
    video {
      width: 300px;
      border-radius: 15px;
      margin-top: 20px;
    }
    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      color: #e91e63;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 10;
    }
  </style>
</head>
<body><audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio><div class="page active" id="page1">
  <h1>Welcome Cutiee 💖</h1>
  <p class="typewriter">Heyy its your birthday 🎂</p>
  <div class="scroll-box">
    <div class="scroll-text">May your smile always stay bright ✨<br>May your dreams come true 🌸<br>You deserve happiness everyday 💕<br>Stay cute forever 🎀</div>
  </div>
  <button onclick="nextPage(2)">Next ➜</button>
</div><div class="page" id="page2">
  <h1>Photo Memories 📸</h1>
  <div class="slideshow">
    <img id="slide" src="photo1.jpg" alt="memory">
  </div>
  <button onclick="nextPage(3)">Next ➜</button>
</div><div class="page" id="page3">
  <h1>Memory Video 🎥</h1>
  <video controls>
    <source src="memory.mp4" type="video/mp4">
  </video>
  <button onclick="nextPage(4)">Next ➜</button>
</div><div class="page" id="page4">
  <h1>Final Surprise 🎁</h1>
  <button onclick="showPopup()">Open Surprise ❤️</button>
</div><div class="popup" id="popup">
  <h2>Happy Birthday Once Again 🎉</h2>
  <p>You are special and always deserve happiness 💕</p>
</div><script>
function nextPage(pageNumber) {
  document.querySelectorAll('.page').forEach(page => {
    if(page.classList.contains('active')) page.classList.add('prev');
    page.classList.remove('active');
  });
  document.getElementById('page' + pageNumber).classList.add('active');
}

function showPopup() {
  document.getElementById('popup').style.display = 'block';
  for(let i=0;i<80;i++){
    let heart=document.createElement('div');
    heart.className='heart';
    heart.innerHTML='❤';
    heart.style.left=Math.random()*100+'vw';
    heart.style.top=Math.random()*100+'vh';
    heart.style.animationDuration=(2+Math.random()*3)+'s';
    document.body.appendChild(heart);
  }
}

const images=['photo1.jpg','photo2.jpg','photo3.jpg'];
let index=0;
setInterval(()=>{
  index=(index+1)%images.length;
  document.getElementById('slide').src=images[index];
},2000);
</script></body>
  </html>
