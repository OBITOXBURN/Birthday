<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wish</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.page{
width:100vw;
height:100vh;
position:absolute;
top:0;
left:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:0.8s;
}

.active{
left:0;
}

.prev{
left:-100%;
}

h1{
color:white;
font-size:2rem;
margin-bottom:20px;
}

.typewriter{
color:white;
font-size:1.3rem;
font-weight:bold;
margin-bottom:20px;
}

.scroll-box{
width:300px;
height:100px;
overflow:hidden;
background:rgba(255,255,255,0.2);
border-radius:15px;
position:relative;
padding:10px;
}

.scroll-text{
position:absolute;
width:100%;
color:white;
text-align:center;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{top:100%}
100%{top:-120%}
}

button{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#d63384;
font-size:1rem;
}

.slideshow{
width:240px;
height:240px;
overflow:hidden;
border-radius:20px;
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

video{
width:320px;
border-radius:15px;
}

.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
text-align:center;
color:#d63384;
}

.heart{
position:fixed;
font-size:22px;
animation:burst 3s linear forwards;
}

@keyframes burst{
100%{
transform:translate(var(--x),var(--y));
opacity:0;
}
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="page active" id="page1">
<h1>Welcome Cutiee 💖</h1>
<div class="typewriter">Heyy its your birthday 🎂</div>

<div class="scroll-box">
<div class="scroll-text">
May your smile always stay bright ✨<br>
May your dreams come true 🌸<br>
You deserve happiness everyday 💕<br>
Stay cute forever 🎀
</div>
</div>

<button onclick="nextPage(2)">Next ➜</button>
</div>

<div class="page" id="page2">
<h1>Photo Memories 📸</h1>
<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>
<button onclick="nextPage(3)">Next ➜</button>
</div>

<div class="page" id="page3">
<h1>Memory Video 🎥</h1>
<video controls>
<source src="memory.mp4" type="video/mp4">
</video>
<button onclick="nextPage(4)">Next ➜</button>
</div>

<div class="page" id="page4">
<h1>Final Surprise 🎁</h1>
<button onclick="showPopup()">Open Surprise ❤️</button>
</div>

<div class="popup" id="popup">
<h2>Happy Birthday 🎉</h2>
<p>Stay happy always 💖</p>
</div>

<script>
function nextPage(page){
document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active');
p.classList.remove('prev');
});

for(let i=1;i<page;i++){
document.getElementById('page'+i).classList.add('prev');
}

document.getElementById('page'+page).classList.add('active');
}

const images=['photo1.jpg','photo2.jpg','photo3.jpg'];
let index=0;

setInterval(()=>{
index=(index+1)%images.length;
document.getElementById('slide').src=images[index];
},2000);

function showPopup(){
document.getElementById('popup').style.display='block';

for(let i=0;i<120;i++){
let heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='❤';
heart.style.left='50vw';
heart.style.top='50vh';
heart.style.setProperty('--x',(Math.random()*900-450)+'px');
heart.style.setProperty('--y',(Math.random()*700-350)+'px');
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},3000);
}
}
</script>

</body>
  </html>
