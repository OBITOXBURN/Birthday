<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish 💖</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pages logic fixed */
        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s ease-in-out, opacity 0.8s;
            transform: translateX(100%); /* Default state: hidden to the right */
            opacity: 0;
            text-align: center;
            padding: 20px;
        }

        .page.active {
            transform: translateX(0); /* Visible state */
            opacity: 1;
            z-index: 2;
        }

        .page.prev {
            transform: translateX(-100%); /* Past state: hidden to the left */
            opacity: 0;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        .typewriter {
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
            animation: typing 2s steps(20, end), blink 0.5s step-end infinite;
        }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: white } }

        .scroll-box {
            width: 300px;
            height: 120px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            position: relative;
            padding: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .scroll-text {
            position: absolute;
            width: 100%;
            left: 0;
            color: white;
            text-align: center;
            line-height: 1.6;
            animation: scroll 10s linear infinite;
        }

        @keyframes scroll {
            0% { top: 100% }
            100% { top: -120% }
        }

        button {
            margin-top: 30px;
            padding: 12px 35px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #d63384;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #fff0f5;
        }

        .slideshow {
            width: 280px;
            height: 280px;
            overflow: hidden;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .slideshow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video {
            width: 90%;
            max-width: 350px;
            border-radius: 15px;
            border: 4px solid white;
        }

        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #d63384;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }

        .heart {
            position: fixed;
            font-size: 25px;
            z-index: 99;
            pointer-events: none;
            animation: burst 3s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="page active" id="page1">
        <h1>Welcome Cutiee 💖</h1>
        <div class="typewriter">Heyy its your birthday 🎂</div>
        
        <div class="scroll-box">
            <div class="scroll-text">
                May your smile always stay bright ✨<br>
                May your dreams come true 🌸<br>
                You deserve happiness everyday 💕<br>
                Stay cute forever 🎀
            </div>
        </div>
        <button onclick="nextPage(2)">Next ➜</button>
    </div>

    <div class="page" id="page2">
        <h1>Photo Memories 📸</h1>
        <div class="slideshow">
            <img id="slide" src="photo1.jpg" onerror="this.src='https://via.placeholder.com/300?text=Photo+Missing'">
        </div>
        <button onclick="nextPage(3)">Next ➜</button>
    </div>

    <div class="page" id="page3">
        <h1>Memory Video 🎥</h1>
        <video id="vdo" controls>
            <source src="memory.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <button onclick="nextPage(4)">Next ➜</button>
    </div>

    <div class="page" id="page4">
        <h1>Final Surprise 🎁</h1>
        <button onclick="showPopup()">Open Surprise ❤️</button>
    </div>

    <div class="popup" id="popup">
        <h2>Happy Birthday 🎉</h2>
        <p style="margin-top:10px;">Stay happy always 💖</p>
        <button onclick="location.reload()" style="background:#d63384; color:white;">Restart ↻</button>
    </div>

    <script>
        // Music Play Start on First Click
        document.addEventListener('click', function() {
            document.getElementById('bgMusic').play().catch(e => console.log("Music error:", e));
        }, { once: true });

        function nextPage(pageNumber) {
            // Remove active/prev from all
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
                p.classList.remove('prev');
            });

            // Set previous pages to 'prev' (slide left)
            for (let i = 1; i < pageNumber; i++) {
                document.getElementById('page' + i).classList.add('prev');
            }

            // Set current page to 'active' (slide in)
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // Slideshow Logic
        const images = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg'];
        let imgIndex = 0;
        const slideImg = document.getElementById('slide');

        setInterval(() => {
            imgIndex = (imgIndex + 1) % images.length;
            slideImg.src = images[imgIndex];
        }, 2500);

        // Surprise Heart Burst
        function showPopup() {
            document.getElementById('popup').style.display = 'block';
            
            for (let i = 0; i < 100; i++) {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️','💖','🌸','✨','🎂'][Math.floor(Math.random()*5)];
                heart.style.left = '50vw';
                heart.style.top = '50vh';
                
                // Random directions
                const x = (Math.random() - 0.5) * window.innerWidth * 1.5;
                const y = (Math.random() - 0.5) * window.innerHeight * 1.5;
                
                heart.style.setProperty('--x', `${x}px`);
                heart.style.setProperty('--y', `${y}px`);
                
                document.body.appendChild(heart);

                setTimeout(() => heart.remove(), 3000);
            }
        }
    </script>
</body>
  </html>
